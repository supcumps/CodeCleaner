<!DOCTYPE html>

  <style>

    label { font-weight: bold; margin-right: 8px; }
    input, select, button { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #3498db; color: white; cursor: pointer; border: none; }
    button:hover { background: #2980b9; }
    .legend { margin-top: 10px; }
    .legend-item { display: inline-block; margin-right: 20px; }
    .legend-color { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    #info { background: #ecf0f1; padding: 10px; margin-top: 10px; border-radius: 4px; display: none; }

  </style>
</head>

    function highlightConnections(nodeId) {
      var connectedNodes = network.getConnectedNodes(nodeId);
      
      allNodes.forEach(function(node) {
        if (node.id === nodeId) {
          // CLICKED NODE - bright blue with thick border
          network.body.data.nodes.update({
            id: node.id,
            opacity: 1,
            hidden: false,
            borderWidth: 5,
            color: {
              background: '#3498db',
              border: '#000000',
              highlight: { background: '#3498db', border: '#000000' }
            },
            font: { color: 'white', size: 14, bold: true }
          });
        } else if (connectedNodes.indexOf(node.id) !== -1) {
          // CONNECTED NODES - keep original color but with bright border
          var originalNode = allNodes.find(n => n.id === node.id);
          var originalColor = originalNode.color.background || originalNode.color;
          network.body.data.nodes.update({
            id: node.id,
            opacity: 1,
            hidden: false,
            borderWidth: 4,
            color: {
              background: originalColor,
              border: '#FFD700',
              highlight: { background: originalColor, border: '#FFD700' }
            },
            font: { color: 'white', size: 12, bold: true }
          });
        } else {
          // HIDE unconnected nodes
          network.body.data.nodes.update({id: node.id, hidden: true});
        }
      });
      
      // Update edges - make connected edges bright and thick
      allEdges.forEach(function(edge) {
        if (edge.from === nodeId || edge.to === nodeId) {
          // Edges directly from/to clicked node - BRIGHT BLUE & THICK
          network.body.data.edges.update({
            from: edge.from,
            to: edge.to,
            hidden: false,
            width: 4,
            color: { color: '#3498db', highlight: '#3498db' },
            arrows: { to: { enabled: true, scaleFactor: 1 } }
          });
        } else {
          // Hide other edges
          network.body.data.edges.update({from: edge.from, to: edge.to, hidden: true});
        }
      });
      
      // Auto-fit to show the subgraph
      setTimeout(function() {
        network.fit({
          nodes: [nodeId].concat(connectedNodes),
          padding: 100,
          animation: { duration: 400 }
        });
      }, 100);
    }

    function resetHighlight() {
      allNodes.forEach(function(node) {
        var originalColor = node.color.background || node.color;
        network.body.data.nodes.update({
          id: node.id,
          opacity: 1,
          hidden: false,
          borderWidth: 2,
          color: {
            background: originalColor,
            border: '#2c3e50',
            highlight: { background: originalColor, border: '#000000' }
          },
          font: { color: 'white', size: 10 }
        });
      });
      allEdges.forEach(function(edge) {
        network.body.data.edges.update({
          from: edge.from,
          to: edge.to,
          hidden: false,
          width: 2,
          color: { color: '#95a5a6', highlight: '#3498db' },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } }
        });
      });
    }

    function showNodeInfo(nodeId) {
      var node = allNodes.find(n => n.id === nodeId);
      if (node) {
        var info = document.getElementById('info');
        info.innerHTML = '<strong>' + node.label + '</strong><br>Complexity: ' + node.complexity + ' | LOC: ' + node.loc;
        info.style.display = 'block';
      }
    }

    function setupControls() {
      document.getElementById('searchBox').addEventListener('input', function(e) {
        var term = e.target.value.toLowerCase();
        if (!term) {
          resetHighlight();
          return;
        }
        var matches = allNodes.filter(n => n.label.toLowerCase().includes(term));
        if (matches.length > 0) {
          network.selectNodes([matches[0].id]);
          network.focus(matches[0].id, { scale: 1.2, animation: { duration: 500 } });
          highlightConnections(matches[0].id);
          showNodeInfo(matches[0].id);
        }
      });

      document.getElementById('complexityFilter').addEventListener('change', function(e) {
        var filter = e.target.value;
        
        if (filter === 'all') {
          // Restore everything
          network.body.data.nodes.clear();
          network.body.data.edges.clear();
          network.body.data.nodes.add(allNodes);
          network.body.data.edges.add(allEdges);
        } else {
          // Filter nodes
          var filtered = allNodes.filter(function(node) {
            if (filter === 'low') return node.complexity <= 5;
            if (filter === 'medium') return node.complexity > 5 && node.complexity <= 10;
            if (filter === 'high') return node.complexity > 10;
          });
          
          // Get IDs of filtered nodes
          var filteredIds = filtered.map(n => n.id);
          
          // Filter edges to only show connections between filtered nodes
          var filteredEdges = allEdges.filter(function(edge) {
            return filteredIds.indexOf(edge.from) !== -1 && filteredIds.indexOf(edge.to) !== -1;
          });
          
          network.body.data.nodes.clear();
          network.body.data.edges.clear();
          network.body.data.nodes.add(filtered);
          network.body.data.edges.add(filteredEdges);
        }
        
        setTimeout(function() {
          network.fit({ padding: 100, animation: { duration: 500 } });
        }, 50);
      });
    }

    function resetView() {
      if (network) {
        // Clear and restore both nodes and edges
        network.body.data.nodes.clear();
        network.body.data.edges.clear();
        network.body.data.nodes.add(allNodes);
        network.body.data.edges.add(allEdges);
        
        // Reset all styling
        resetHighlight();
        
        // Clear search and filter
        document.getElementById('searchBox').value = '';
        document.getElementById('complexityFilter').value = 'all';
        document.getElementById('info').style.display = 'none';
        
        // Re-enable physics briefly to reorganize
        network.setOptions({ physics: { enabled: true } });
        setTimeout(function() {
          network.setOptions({ physics: { enabled: false } });
          network.fit({ padding: 50, animation: { duration: 500 } });
        }, 500);
      }
    }

    function fitNetwork() {
      if (network) network.fit({ padding: 50, animation: { duration: 500 } });
    }

    function zoomIn() {
      if (network) {
        var scale = network.getScale();
        network.moveTo({ scale: scale * 1.2, animation: { duration: 300 } });
      }
    }

    function zoomOut() {
      if (network) {
        var scale = network.getScale();
        network.moveTo({ scale: scale * 0.8, animation: { duration: 300 } });
      }
    }
  </script>
</body>
</html>
